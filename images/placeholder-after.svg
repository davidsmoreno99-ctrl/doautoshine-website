<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#181818"/>
  <defs>
    <radialGradient id="shine" cx="60%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#181818"/>
    </radialGradient>
  </defs>
  <rect width="400" height="280" fill="url(#shine)"/>
  <!-- Sparkle / shine icon -->
  <g transform="translate(200,112)" fill="#3a3a3a">
    <!-- star shape -->
    <polygon points="0,-22 3,-8 16,-8 6,1 10,15 0,7 -10,15 -6,1 -16,-8 -3,-8" fill="#2e2e2e"/>
    <polygon points="0,-10 1.5,-4 7,-4 2.5,0 4.5,7 0,3 -4.5,7 -2.5,0 -7,-4 -1.5,-4" fill="#3e3e3e" transform="translate(18,18) scale(0.7)"/>
  </g>
  <!-- AFTER label -->
  <rect x="158" y="145" width="84" height="22" rx="11" fill="#202018" stroke="#383828" stroke-width="1"/>
  <text x="200" y="161" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#686850" text-anchor="middle" letter-spacing="2">AFTER</text>
  <!-- instruction -->
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Replace with your photo</text>
  <text x="200" y="212" font-family="Arial, sans-serif" font-size="10" fill="#2e2e2e" text-anchor="middle">See README.txt in /images</text>
</svg>
