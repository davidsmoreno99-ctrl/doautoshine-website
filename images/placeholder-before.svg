<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#141414"/>
  <rect width="400" height="280" fill="url(#grain)" opacity="0.4"/>
  <defs>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#1a1a1a"/>
    </pattern>
  </defs>
  <!-- Camera icon -->
  <g transform="translate(200,115)" fill="#333333">
    <rect x="-28" y="-20" width="56" height="42" rx="5"/>
    <circle cx="0" cy="-2" r="12" fill="#141414"/>
    <circle cx="0" cy="-2" r="8" fill="#2a2a2a"/>
    <rect x="-10" y="-28" width="20" height="10" rx="3"/>
  </g>
  <!-- BEFORE label -->
  <rect x="155" y="145" width="90" height="22" rx="11" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="161" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#555555" text-anchor="middle" letter-spacing="2">BEFORE</text>
  <!-- instruction -->
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Replace with your photo</text>
  <text x="200" y="212" font-family="Arial, sans-serif" font-size="10" fill="#2e2e2e" text-anchor="middle">See README.txt in /images</text>
</svg>
